version: '3.8'

services:

  db:
    image: mysql:8.0
    container_name: mechanical_sheets_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mechanical_sheets
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./MechanicalSheets.Api
      dockerfile: Dockerfile
    container_name: mechanical_sheets_api
    restart: always
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Default=Server=db;Port=3306;Database=mechanical_sheets;User=app_user;Password=app_pass;
      - Jwt__Key=mechanical_sheets_super_secret_key_32chars!!
      - Jwt__Issuer=MechanicalSheetsApi
      - Jwt__ExpiresInHours=8
      - Storage__UploadPath=/app/uploads
    volumes:
      - uploads_data:/app/uploads
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
  uploads_data: