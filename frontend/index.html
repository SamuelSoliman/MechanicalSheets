<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mechanical Sheets</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a2e; }

    nav {
      background: #1a1a2e; color: white; padding: 14px 24px;
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    nav .brand { font-size: 1.1rem; font-weight: 700; }
    nav .user-info { display: flex; align-items: center; gap: 12px; font-size: 0.9rem; }
    .role-badge {
      background: #e94560; padding: 3px 10px; border-radius: 12px;
      font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
    }
    .role-badge.manager { background: #0f3460; border: 1px solid #e94560; }
    nav button.logout {
      background: transparent; border: 1px solid rgba(255,255,255,0.3);
      color: white; padding: 5px 12px; border-radius: 6px; cursor: pointer;
    }
    nav button.logout:hover { background: rgba(255,255,255,0.1); }

    .container { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }

    #login-page {
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; background: #1a1a2e;
    }
    .login-card {
      background: white; padding: 40px; border-radius: 16px;
      width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .login-card h2 { margin-bottom: 6px; font-size: 1.5rem; }
    .login-card .subtitle { color: #888; font-size: 0.85rem; margin-bottom: 28px; }

    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block; font-size: 0.82rem; font-weight: 600; color: #555;
      margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 10px 14px; border: 1.5px solid #e0e0e0;
      border-radius: 8px; font-size: 0.95rem; background: #fafafa; transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none; border-color: #e94560; background: white;
    }
    .form-group textarea { resize: vertical; min-height: 80px; }

    .btn {
      padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer;
      font-size: 0.9rem; font-weight: 600; transition: all 0.2s;
    }
    .btn-primary { background: #e94560; color: white; }
    .btn-primary:hover { background: #c73652; }
    .btn-secondary { background: #0f3460; color: white; }
    .btn-secondary:hover { background: #0a2540; }
    .btn-success { background: #27ae60; color: white; }
    .btn-success:hover { background: #219a52; }
    .btn-danger { background: #e74c3c; color: white; }
    .btn-danger:hover { background: #c0392b; }
    .btn-outline { background: transparent; border: 1.5px solid #e94560; color: #e94560; }
    .btn-outline:hover { background: #e94560; color: white; }
    .btn-gray { background: #6c757d; color: white; }
    .btn-gray:hover { background: #5a6268; }
    .btn-sm { padding: 6px 12px; font-size: 0.8rem; }
    .btn-full { width: 100%; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .page-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;
    }
    .page-header h2 { font-size: 1.4rem; }

    .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab {
      padding: 7px 16px; border-radius: 20px; border: 1.5px solid #e0e0e0;
      background: white; cursor: pointer; font-size: 0.85rem; font-weight: 600; color: #666;
    }
    .tab.active { background: #e94560; border-color: #e94560; color: white; }

    .card {
      background: white; border-radius: 12px; padding: 20px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07); margin-bottom: 16px;
      border: 1px solid #f0f0f0;
    }
    .card-header {
      display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px;
    }
    .card-header h3 { font-size: 1rem; }
    .card-meta { font-size: 0.82rem; color: #888; margin-top: 4px; }

    .badge {
      display: inline-block; padding: 4px 12px; border-radius: 20px;
      font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
    }
    .badge-draft     { background: #f0f0f0; color: #666; }
    .badge-submitted { background: #fff3cd; color: #856404; }
    .badge-approved  { background: #d4edda; color: #155724; }
    .badge-rejected  { background: #f8d7da; color: #721c24; }
    .badge-closed    { background: #d1ecf1; color: #0c5460; }

    .actions-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }

    .rejection-box {
      background: #fff3f3; border: 1px solid #f5c6cb; border-radius: 8px;
      padding: 10px 14px; margin-top: 10px; font-size: 0.85rem; color: #721c24;
    }
    .rejection-box strong { display: block; margin-bottom: 4px; }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px;
    }
    .modal {
      background: white; border-radius: 16px; padding: 28px; width: 100%;
      max-width: 600px; max-height: 88vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .modal h3 { margin-bottom: 20px; font-size: 1.15rem; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

    .alert {
      padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 0.88rem;
    }
    .alert-error   { background: #f8d7da; color: #721c24; }
    .alert-success { background: #d4edda; color: #155724; }

    .defect-item {
      background: #f8f9fa; border-radius: 8px; padding: 12px 16px;
      margin-bottom: 8px; border-left: 3px solid #e94560;
      display: flex; justify-content: space-between; align-items: flex-start;
    }
    .defect-code { font-weight: 700; color: #e94560; font-size: 0.82rem; }
    .defect-desc { color: #333; font-size: 0.9rem; margin-top: 2px; }
    .defect-note { color: #888; font-size: 0.8rem; margin-top: 4px; }
    .defect-flags { font-size: 0.78rem; color: #888; text-align: right; min-width: 60px; }

    .section-title {
      font-size: 0.82rem; font-weight: 700; color: #888; text-transform: uppercase;
      letter-spacing: 0.5px; margin: 20px 0 10px;
    }

    .photo-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .photo-thumb {
      width: 80px; height: 80px; border-radius: 8px; object-fit: cover;
      border: 2px solid #e0e0e0; cursor: pointer;
    }

    .empty { text-align: center; padding: 48px 20px; color: #aaa; }
    .empty .icon { font-size: 3rem; margin-bottom: 12px; }

    .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 0.88rem; }

    .checkbox-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; }
    .checkbox-row label {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.88rem; cursor: pointer; font-weight: normal;
    }

    .hidden { display: none !important; }

    .global-alert {
      position: fixed; top: 70px; right: 20px; z-index: 999;
      padding: 12px 20px; border-radius: 10px; font-size: 0.9rem;
      font-weight: 600; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      transition: opacity 0.3s;
    }
  </style>
</head>
<body>


<div id="global-alert" class="global-alert hidden"></div>


<div id="login-page">
  <div class="login-card">
    <h2>🔧 Mechanical Sheets</h2>
    <p class="subtitle">Gestione schede di intervento meccanico</p>
    <div id="login-error" class="alert alert-error hidden"></div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="mario.rossi@test.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" />
    </div>
    <button class="btn btn-primary btn-full" onclick="login()">Accedi</button>
    <div style="margin-top:20px;padding-top:16px;border-top:1px solid #eee;">
      <p style="font-size:0.78rem;color:#aaa;margin-bottom:8px;font-weight:600;">ACCESSO RAPIDO</p>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <button class="btn btn-outline btn-sm" onclick="fillLogin('mario.rossi@test.com')">👷 Mario Rossi — mechanic</button>
        <button class="btn btn-outline btn-sm" onclick="fillLogin('john.doe@test.com')">👷 John Doe — mechanic</button>
        <button class="btn btn-outline btn-sm" onclick="fillLogin('anna.verdi@test.com')">👷 Anna Verdi — mechanic</button>
        <button class="btn btn-secondary btn-sm" onclick="fillLogin('manager@test.com')">👔 Manager One — manager</button>
      </div>
    </div>
  </div>
</div>


<div id="app" class="hidden">
  <nav>
    <span class="brand">🔧 Mechanical Sheets</span>
    <div class="user-info">
      <span id="nav-name"></span>
      <span id="nav-badge" class="role-badge"></span>
      <button class="logout" onclick="logout()">Esci</button>
    </div>
  </nav>

  <div class="container">

    <div id="view-list">
      <div class="page-header">
        <h2 id="list-title">Schede</h2>
        <div style="display:flex;gap:8px;align-items:center;">
          <span id="pending-badge" class="badge badge-submitted hidden"></span>
          <button id="btn-new-sheet" class="btn btn-primary hidden" onclick="showView('view-create')">+ Nuova scheda</button>
        </div>
      </div>
      <div class="tabs" id="filter-tabs"></div>
      <div id="sheets-list"></div>
    </div>

   
    <div id="view-create" class="hidden">
      <div class="page-header">
        <h2>📋 Nuova scheda</h2>
        <button class="btn btn-gray" onclick="showView('view-list')">← Torna alla lista</button>
      </div>
      <div class="card">
        <div class="form-group">
          <label>Codice veicolo *</label>
          <input type="text" id="new-code" placeholder="es. VEI-007" />
        </div>
        <div class="form-group">
          <label>Marca</label>
          <input type="text" id="new-brand" placeholder="es. Fiat" />
        </div>
        <div class="form-group">
          <label>Modello</label>
          <input type="text" id="new-vehicle" placeholder="es. 500" />
        </div>
        <div class="form-group">
          <label>Data ispezione *</label>
          <input type="date" id="new-date" />
        </div>
        <div style="display:flex;gap:10px;margin-top:8px;">
          <button class="btn btn-outline" onclick="showView('view-list')">Annulla</button>
          <button class="btn btn-primary" onclick="createSheet()">Crea scheda</button>
        </div>
      </div>
    </div>

 
    <div id="view-detail" class="hidden">
      <div class="page-header">
        <h2 id="detail-heading"></h2>
        <button class="btn btn-gray" onclick="showView('view-list')">← Torna alla lista</button>
      </div>
      <div id="detail-body"></div>
    </div>

  </div>
</div>


<div id="modal-defect" class="modal-overlay hidden">
  <div class="modal">
    <h3>🔍 Aggiungi difetto</h3>
    <div class="form-group">
      <label>Tipo difetto *</label>
      <select id="defect-catalog-id"></select>
    </div>
    <div class="form-group">
      <label>Gravità (0-5)</label>
      <input type="number" id="defect-gravity" min="0" max="5" value="1" />
    </div>
    <div class="form-group">
      <label>Estensione</label>
      <div class="checkbox-row">
        <label><input type="checkbox" id="extent-low"> Bassa (0.2)</label>
        <label><input type="checkbox" id="extent-medium"> Media (0.5)</label>
        <label><input type="checkbox" id="extent-high"> Alta (1)</label>
      </div>
    </div>
    <div class="form-group">
      <label>Intensità</label>
      <div class="checkbox-row">
        <label><input type="checkbox" id="intensity-low"> Bassa (0.2)</label>
        <label><input type="checkbox" id="intensity-medium"> Media (0.5)</label>
        <label><input type="checkbox" id="intensity-high"> Alta (1)</label>
      </div>
    </div>
    <div class="checkbox-row">
      <label><input type="checkbox" id="d-seen"> Visto</label>
      <label><input type="checkbox" id="d-ps"> PS</label>
      <label><input type="checkbox" id="d-na"> NA</label>
      <label><input type="checkbox" id="d-nr"> NR</label>
      <label><input type="checkbox" id="d-np"> NP</label>
    </div>
    <div class="form-group">
      <label>Note</label>
      <textarea id="defect-notes" placeholder="Note aggiuntive..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('modal-defect')">Annulla</button>
      <button class="btn btn-primary" onclick="submitDefect()">Aggiungi</button>
    </div>
  </div>
</div>


<div id="modal-photo" class="modal-overlay hidden">
  <div class="modal">
    <h3>📷 Carica foto</h3>
    <p style="color:#666;font-size:0.88rem;margin-bottom:16px;">
      Formati accettati: JPEG, PNG, WEBP. Max 5MB.
    </p>
    <div class="form-group">
      <label>Seleziona immagine</label>
      <input type="file" id="photo-file" accept="image/jpeg,image/png,image/webp" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('modal-photo')">Annulla</button>
      <button class="btn btn-primary" onclick="submitPhoto()">Carica</button>
    </div>
  </div>
</div>


<div id="modal-reject" class="modal-overlay hidden">
  <div class="modal">
    <h3>❌ Rifiuta scheda</h3>
    <p style="color:#666;font-size:0.88rem;margin-bottom:16px;">
      Spiega al meccanico cosa deve correggere prima di reinviare.
    </p>
    <div class="form-group">
      <label>Motivo rifiuto *</label>
      <textarea id="reject-note" placeholder="es. Mancano foto per i difetti carrozzeria..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('modal-reject')">Annulla</button>
      <button class="btn btn-danger" onclick="confirmReject()">Conferma rifiuto</button>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:5000/api';

// ── STATE ──
let token = null;
let user  = null;
let allSheets    = [];
let defectCatalog = [];
let currentFilter = 'all';
let activeSheetId  = null;   
let activeDefectId = null;   


function parseJwt(t) {
  try { return JSON.parse(atob(t.split('.')[1])); } catch { return null; }
}

function normalizeRole(role) {
  return (role || '').toString().toLowerCase();
}

function isEditable(status) {
  const s = (status || '').toString().toLowerCase();
  return s === 'draft' || s === 'rejected';
}

function isSubmittable(status) {
  return isEditable(status);
}

function isReviewable(status) {
  return (status || '').toString().toLowerCase() === 'submitted';
}

function isMechanic() {
  return user?.role === 'mechanic';
}

function isManager() {
  return user?.role === 'manager';
}

async function apiFetch(method, path, body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (token) opts.headers['Authorization'] = `Bearer ${token}`;
  if (body)  opts.body = JSON.stringify(body);
  const res  = await fetch(API + path, opts);
  const data = res.ok ? await res.json().catch(() => ({})) : await res.json().catch(() => ({}));
  return { ok: res.ok, status: res.status, data };
}

async function apiUpload(path, formData) {
  const res  = await fetch(API + path, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${token}` },
    body: formData
  });
  const data = res.ok ? await res.json().catch(() => ({})) : await res.json().catch(() => ({}));
  return { ok: res.ok, data };
}

function toast(msg, type = 'error') {
  const el = document.getElementById('global-alert');
  el.textContent = msg;
  el.className = `global-alert alert-${type}`;
  el.style.opacity = '1';
  el.classList.remove('hidden');
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.classList.add('hidden'), 300); }, 3500);
}

function showView(id) {
  ['view-list','view-create','view-detail'].forEach(v =>
    document.getElementById(v).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

function badge(status) {
  const map = { draft:'Bozza', submitted:'Inviata', approved:'Approvata', rejected:'Rifiutata', closed:'Chiusa' };
  const s = (status || '').toLowerCase();
  return `<span class="badge badge-${s}">${map[s] || status}</span>`;
}


function fillLogin(email) {
  document.getElementById('login-email').value    = email;
  document.getElementById('login-password').value = 'password123';
}

async function login() {
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl    = document.getElementById('login-error');
  errEl.classList.add('hidden');

  const res = await fetch(`${API}/auth/login`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password })
  });

  if (!res.ok) { errEl.textContent = 'Credenziali non valide'; errEl.classList.remove('hidden'); return; }

  const data   = await res.json();
  token        = data.token;
  const payload = parseJwt(token);
  console.log('JWT Payload:', payload);
  
  const roleClaimUri = 'http://schemas.microsoft.com/ws/2008/06/identity/claims/role';
  const emailClaimUri = 'http://schemas.xmlsoap.org/ws/2005/05/identity/claims/emailaddress';
  const nameClaim = payload['http://schemas.xmlsoap.org/ws/2005/05/identity/claims/givenname'] || payload.name;
  
  user = { 
    id: parseInt(payload.sub), 
    email: payload[emailClaimUri] || payload.email || email, 
    name: nameClaim || email, 
    role: normalizeRole(payload[roleClaimUri]) 
  };
  
  console.log('Extracted role:', payload[roleClaimUri], '→ normalized:', user.role);
  document.getElementById('nav-name').textContent  = user.name;
  const nb = document.getElementById('nav-badge');
  nb.textContent  = user.role;
  nb.className    = `role-badge${isManager() ? ' manager' : ''}`;

  document.getElementById('login-page').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');


  const cat = await apiFetch('GET', '/defect-catalog');
  if (cat.ok) defectCatalog = cat.data;


  if (isMechanic()) {
    document.getElementById('list-title').textContent   = 'Le mie schede';
    document.getElementById('btn-new-sheet').classList.remove('hidden');
    buildTabs(['all','Draft','Submitted','Rejected','Approved']);
  } else {
    document.getElementById('list-title').textContent   = 'Tutte le schede';
    document.getElementById('pending-badge').classList.remove('hidden');
    buildTabs(['all','Submitted','Approved','Rejected','Closed']);
  }

  showView('view-list');
  await loadSheets();
}

function logout() {
  token = null; user = null; allSheets = [];
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-page').classList.remove('hidden');
}


function buildTabs(filters) {
  const labels = { all:'Tutte', Draft:'Bozze', Submitted:'Inviate', Approved:'Approvate', Rejected:'Rifiutate', Closed:'Chiuse' };
  document.getElementById('filter-tabs').innerHTML = filters.map(f =>
    `<button class="tab${f === 'all' ? ' active' : ''}" onclick="setFilter('${f}', this)">${labels[f]}</button>`
  ).join('');
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderSheets();
}


async function loadSheets() {
  const res = await apiFetch('GET', '/sheets');
  if (!res.ok) return;
  allSheets = res.data;

  if (isManager()) {
    const pending = allSheets.filter(s => isReviewable(s.status)).length;
    const pb = document.getElementById('pending-badge');
    pb.textContent = pending > 0 ? `${pending} da revisionare` : '';
  }
  renderSheets();
}

function renderSheets() {
  const list = currentFilter === 'all' ? allSheets : allSheets.filter(s => s.status === currentFilter);
  const el   = document.getElementById('sheets-list');

  if (list.length === 0) {
    el.innerHTML = `<div class="empty"><div class="icon">📋</div><p>Nessuna scheda</p></div>`;
    return;
  }
console.log('isMechanic?', isMechanic());
  el.innerHTML = list.map(s => {
    console.log('renderSheets role/status', user.role, s.status);
    const canEdit   = isMechanic() && isEditable(s.status);
    const canSubmit = isMechanic() && isSubmittable(s.status);
    const canReview = isManager() && isReviewable(s.status);

    return `
    <div class="card">
      <div class="card-header">
        <div>
          <h3>${s.code}${s.brand ? ' — ' + s.brand : ''}${s.vehicle ? ' ' + s.vehicle : ''}</h3>
          <div class="card-meta">
            📅 ${s.inspectionDate} &nbsp;·&nbsp;
            🔍 ${s.defectItems.length} difetti
            ${isManager() ? ` &nbsp;·&nbsp; 👷 <strong>${s.createdBy.name}</strong>` : ''}
          </div>
        </div>
        ${badge(s.status)}
      </div>

      ${s.status === 'Rejected' && s.rejectionNote ? `
        <div class="rejection-box">
          <strong>⚠️ Motivo rifiuto:</strong> ${s.rejectionNote}
        </div>` : ''}

      <div class="actions-row">
        <button class="btn btn-outline btn-sm" onclick="openDetail(${s.id})">👁 Dettaglio</button>

        ${canEdit ? `
          <button class="btn btn-secondary btn-sm" onclick="openDetail(${s.id}, true)">✏️ Modifica</button>
        ` : ''}

        ${canSubmit ? `
          <button class="btn btn-primary btn-sm" onclick="submitSheet(${s.id})">📤 Invia</button>
        ` : ''}

        ${canReview ? `
          <button class="btn btn-success btn-sm" onclick="approveSheet(${s.id})">✓ Approva</button>
          <button class="btn btn-danger btn-sm"  onclick="openReject(${s.id})">✗ Rifiuta</button>
        ` : ''}
      </div>
    </div>`;
  }).join('');
}


async function openDetail(id, editMode = false) {
  const res = await apiFetch('GET', `/sheets/${id}`);
  if (!res.ok) { toast('Errore caricamento scheda'); return; }
  const s = res.data;
  activeSheetId = id;

  console.log('openDetail role/status', user.role, s.status);
  const canEdit   = isMechanic() && isEditable(s.status);
  const canReview = isManager() && isReviewable(s.status);

  document.getElementById('detail-heading').innerHTML =
    `${s.code} — ${s.brand || ''} ${s.vehicle || ''} ${badge(s.status)}`;

  let html = '';


  html += `
    <div class="card">
      <div class="section-title">Informazioni scheda</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:0.9rem;">
        <div><strong>Data ispezione:</strong><br>${s.inspectionDate}</div>
        <div><strong>Creata da:</strong><br>${s.createdBy.name}</div>
        ${s.reviewedBy ? `<div><strong>Revisionata da:</strong><br>${s.reviewedBy.name}</div>` : ''}
        ${s.submittedAt ? `<div><strong>Inviata il:</strong><br>${new Date(s.submittedAt).toLocaleString('it-IT')}</div>` : ''}
        ${s.technicians.length > 0 ? `<div><strong>Tecnici:</strong><br>${s.technicians.map(t=>t.name).join(', ')}</div>` : ''}
      </div>
      ${s.rejectionNote ? `
        <div class="rejection-box" style="margin-top:14px;">
          <strong>⚠️ Motivo rifiuto:</strong> ${s.rejectionNote}
        </div>` : ''}
    </div>`;


  html += `<div class="card">`;
  html += `<div class="section-title">Difetti (${s.defectItems.length})</div>`;

  if (s.defectItems.length === 0) {
    html += `<p style="color:#aaa;font-size:0.88rem;">Nessun difetto registrato</p>`;
  } else {
    html += s.defectItems.map(d => `
      <div class="defect-item" id="defect-row-${d.id}">
        <div style="flex:1;">
          <div class="defect-code">${d.defectCode} — ${d.defectCategory}</div>
          <div class="defect-desc">${d.defectDescription}</div>
          ${d.notes ? `<div class="defect-note">📝 ${d.notes}</div>` : ''}
          <div style="font-size:0.78rem;color:#888;margin-top:4px;">
            G:${d.gravity}
            ${d.extentLow?'Ext:0.2':d.extentMedium?'Ext:0.5':d.extentHigh?'Ext:1':''}
            ${d.intensityLow?' Int:0.2':d.intensityMedium?' Int:0.5':d.intensityHigh?' Int:1':''}
            ${d.isPs?' <strong style="color:#e94560;">PS</strong>':''}
            ${d.isNa?' NA':''}${d.isNr?' NR':''}${d.isNp?' NP':''}
            ${d.isSeen?' 👁':''}
          </div>
          ${d.hasPhoto ? `<div style="font-size:0.78rem;color:#27ae60;margin-top:2px;">📷 Foto presenti</div>` : ''}
        </div>
        ${canEdit ? `
          <div style="display:flex;flex-direction:column;gap:6px;margin-left:12px;">
            <button class="btn btn-sm btn-outline" onclick="openPhotoModal(${d.id})" title="Carica foto">📷</button>
            <button class="btn btn-sm btn-danger" onclick="deleteDefect(${s.id}, ${d.id})" title="Elimina difetto">🗑</button>
          </div>` : ''}
      </div>`).join('');
  }

  if (canEdit) {
    html += `
      <div style="margin-top:14px;">
        <button class="btn btn-secondary btn-sm" onclick="openDefectModal()">+ Aggiungi difetto</button>
      </div>`;
  }

  html += `</div>`;


  if (canReview) {
    html += `
      <div class="card" style="border: 2px solid #e94560;">
        <div class="section-title" style="color:#e94560;">Azioni manager</div>
        <div class="actions-row">
          <button class="btn btn-success" onclick="approveSheet(${s.id})">✓ Approva scheda</button>
          <button class="btn btn-danger"  onclick="openReject(${s.id})">✗ Rifiuta scheda</button>
        </div>
      </div>`;
  }


  if (canEdit) {
    html += `
      <div class="actions-row" style="margin-top:4px;">
        <button class="btn btn-primary" onclick="submitSheet(${s.id})">📤 Invia per revisione</button>
      </div>`;
  }

  document.getElementById('detail-body').innerHTML = html;
  showView('view-detail');
}


async function createSheet() {
  const code = document.getElementById('new-code').value.trim();
  const date = document.getElementById('new-date').value;
  if (!code) { toast('Il codice veicolo è obbligatorio'); return; }
  if (!date) { toast('La data è obbligatoria'); return; }

  const res = await apiFetch('POST', '/sheets', {
    code,
    brand: document.getElementById('new-brand').value.trim() || null,
    vehicle: document.getElementById('new-vehicle').value.trim() || null,
    inspectionDate: date,
    technicianIds: []
  });

  if (res.ok) {
    toast('Scheda creata', 'success');
    document.getElementById('new-code').value = '';
    document.getElementById('new-brand').value = '';
    document.getElementById('new-vehicle').value = '';
    await loadSheets();
    await openDetail(res.data.id, true);
  } else {
    toast(res.data?.message || 'Errore nella creazione');
  }
}


function openDefectModal() {
  const sel = document.getElementById('defect-catalog-id');
  sel.innerHTML = defectCatalog.map(d =>
    `<option value="${d.id}">[${d.code}] ${d.description}</option>`
  ).join('');
  document.getElementById('defect-gravity').value  = 1;
  ['d-seen','d-ps','d-na','d-nr','d-np','extent-low','extent-medium','extent-high','intensity-low','intensity-medium','intensity-high'].forEach(id =>
    document.getElementById(id).checked = false);
  document.getElementById('defect-notes').value = '';
  document.getElementById('modal-defect').classList.remove('hidden');
}

async function submitDefect() {
  const res = await apiFetch('POST', `/sheets/${activeSheetId}/defects`, {
    defectCatalogId: parseInt(document.getElementById('defect-catalog-id').value),
    isSeen:   document.getElementById('d-seen').checked,
    gravity:  parseInt(document.getElementById('defect-gravity').value),
    extentLow:    document.getElementById('extent-low').checked,
    extentMedium: document.getElementById('extent-medium').checked,
    extentHigh:   document.getElementById('extent-high').checked,
    intensityLow:    document.getElementById('intensity-low').checked,
    intensityMedium: document.getElementById('intensity-medium').checked,
    intensityHigh:   document.getElementById('intensity-high').checked,
    isPs: document.getElementById('d-ps').checked,
    isNa: document.getElementById('d-na').checked,
    isNr: document.getElementById('d-nr').checked,
    isNp: document.getElementById('d-np').checked,
    notes: document.getElementById('defect-notes').value || null
  });

  if (res.ok) {
    closeModal('modal-defect');
    toast('Difetto aggiunto', 'success');
    await openDetail(activeSheetId, true);
  } else {
    toast(res.data?.message || 'Errore aggiunta difetto');
  }
}

async function deleteDefect(sheetId, itemId) {
  if (!confirm('Eliminare questo difetto?')) return;
  const res = await apiFetch('DELETE', `/sheets/${sheetId}/defects/${itemId}`);
  if (res.ok) {
    toast('Difetto eliminato', 'success');
    await openDetail(sheetId, true);
  } else {
    toast(res.data?.message || 'Errore eliminazione');
  }
}

function openPhotoModal(defectId) {
  activeDefectId = defectId;
  document.getElementById('photo-file').value = '';
  document.getElementById('modal-photo').classList.remove('hidden');
}

async function submitPhoto() {
  const fileInput = document.getElementById('photo-file');
  if (!fileInput.files[0]) { toast('Seleziona un file'); return; }

  const formData = new FormData();
  formData.append('file', fileInput.files[0]);

  const res = await apiUpload(
    `/sheets/${activeSheetId}/defects/${activeDefectId}/attachments`,
    formData
  );

  if (res.ok) {
    closeModal('modal-photo');
    toast('Foto caricata', 'success');
    await openDetail(activeSheetId, true);
  } else {
    toast(res.data?.message || 'Errore upload foto');
  }
}


async function submitSheet(id) {
  if (!confirm('Inviare la scheda per revisione?')) return;
  const res = await apiFetch('POST', `/sheets/${id}/submit`);
  if (res.ok) {
    toast('Scheda inviata', 'success');
    await loadSheets();
    showView('view-list');
  } else {
    toast(res.data?.message || 'Errore invio');
  }
}

async function approveSheet(id) {
  if (!confirm('Approvare questa scheda?')) return;
  const res = await apiFetch('POST', `/sheets/${id}/approve`);
  if (res.ok) {
    toast('Scheda approvata ✓', 'success');
    await loadSheets();
    showView('view-list');
  } else {
    toast(res.data?.message || 'Errore approvazione');
  }
}

function openReject(id) {
  activeSheetId = id;
  document.getElementById('reject-note').value = '';
  document.getElementById('modal-reject').classList.remove('hidden');
}

async function confirmReject() {
  const note = document.getElementById('reject-note').value.trim();
  if (!note) { toast('La nota è obbligatoria'); return; }
  const res = await apiFetch('POST', `/sheets/${activeSheetId}/reject`, { rejectionNote: note });
  if (res.ok) {
    closeModal('modal-reject');
    toast('Scheda rifiutata', 'success');
    await loadSheets();
    showView('view-list');
  } else {
    toast(res.data?.message || 'Errore rifiuto');
  }
}


document.getElementById('login-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});
